<style>
  :root {
    --ink: #0A1929;
    --accent: #0072B5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--ink);
    color: white;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .page {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('home-hero.jpg');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(10, 25, 41, 0.4) 0%, rgba(10, 25, 41, 0) 18%),
      linear-gradient(to top right, rgba(10, 25, 41, 0.75) 0%, rgba(10, 25, 41, 0.2) 55%, rgba(10, 25, 41, 0) 80%);
    z-index: 1;
  }

  .nav {
    position: relative;
    z-index: 2;
    padding: 32px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: white;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 24px;
    font-size: 13px;
    font-weight: 500;
  }

  .nav-links a {
    color: white;
    text-decoration: none;
    opacity: 0.85;
    transition: opacity 0.2s;
  }

  .nav-links a:hover {
    opacity: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 48px 120px;
    max-width: 1240px;
    margin: 0 auto;
    width: 100%;
  }

  .eyebrow {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: white;
    opacity: 0.85;
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: clamp(30px, 3.4vw, 48px);
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: white;
    max-width: 580px;
    margin-bottom: 48px;
  }

  .signup-wrap {
    max-width: 480px;
  }

  .signup-label {
    font-size: 16px;
    font-weight: 500;
    color: white;
    opacity: 0.92;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .kit-embed form {
    background: transparent !important;
  }

  /* Kit form overrides */
  .kit-embed .formkit-form,
  .kit-embed form {
    background: transparent !important;
    margin: 0 !important;
    padding: 0 !important;
    border: none !important;
    box-shadow: none !important;
  }

  .kit-embed input,
  .kit-embed input[type="email"],
  .kit-embed input[type="text"],
  .kit-embed .formkit-input,
  form.formkit-form .formkit-input {
    background: rgba(255, 255, 255, 0.15) !important;
    border: 2px solid rgba(255, 255, 255, 0.45) !important;
    color: white !important;
    padding: 16px 22px !important;
    border-radius: 999px !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 15px !important;
    font-weight: 500 !important;
    width: 100% !important;
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
    height: auto !important;
    min-height: 54px !important;
    box-shadow: none !important;
  }

  .kit-embed input::placeholder {
    color: rgba(255, 255, 255, 0.6) !important;
  }

  .kit-embed input:focus {
    border-color: white !important;
    background: rgba(255, 255, 255, 0.2) !important;
    outline: none !important;
  }

  .kit-embed button,
  .kit-embed .formkit-submit,
  .kit-embed button[type="submit"],
  form.formkit-form button {
    background: white !important;
    color: #0A1929 !important;
    border: none !important;
    padding: 16px 28px !important;
    border-radius: 999px !important;
    font-family: 'Inter', sans-serif !important;
    font-weight: 600 !important;
    font-size: 15px !important;
    letter-spacing: 0.01em !important;
    cursor: pointer !important;
    transition: all 0.2s !important;
    width: auto !important;
    min-height: 54px !important;
  }

  .kit-embed button:hover,
  .kit-embed .formkit-submit:hover {
    background: #0072B5 !important;
    color: white !important;
  }

  .kit-embed .formkit-alert,
  .kit-embed [class*="alert"],
  .kit-embed [role="alert"] {
    background: rgba(255, 100, 100, 0.12) !important;
    color: rgba(255, 200, 200, 1) !important;
    border: 1px solid rgba(255, 100, 100, 0.3) !important;
    padding: 12px 16px !important;
    border-radius: 8px !important;
    font-size: 13px !important;
    font-family: 'Inter', sans-serif !important;
    margin: 12px 0 !important;
  }

  /* Hide Kit branding - CSS attempt */
  .kit-embed [class*="powered"],
  .kit-embed [class*="built-with"],
  .kit-embed [class*="formkit-built"],
  .kit-embed a[href*="kit.com"],
  .kit-embed a[href*="convertkit"],
  .kit-embed [data-element*="powered"] {
    display: none !important;
  }

  /* Hide Kit branding */
  .kit-embed [class*="powered"],
  .kit-embed [class*="built-with"],
  .kit-embed a[href*="kit.com"],
  .kit-embed a[href*="convertkit"] {
    display: none !important;
  }

  .footer {
    display: none;
  }

  @media (max-width: 700px) {
    .nav, .content, .footer { padding-left: 24px; padding-right: 24px; }
    .content { padding-bottom: 64px; }
    .nav-links { gap: 14px; font-size: 12px; }
    .footer { flex-direction: column; text-align: center; gap: 12px; }

    .overlay {
      background: linear-gradient(to bottom, rgba(10, 25, 41, 0.2) 0%, rgba(10, 25, 41, 0.4) 50%, rgba(10, 25, 41, 0.85) 100%);
    }

<body>

<div class="page">
  <div class="bg"></div>
  <div class="overlay"></div>

  <nav class="nav">
    <a href="/" class="wordmark">Living BIG</a>
  </nav>

  <div class="content">
    <div class="eyebrow">Coming soon</div>
    <h1>The biggest creators meet the world's biggest animals — and their biggest champions.</h1>
    <div class="signup-wrap">
      <div class="signup-label">Be there when the first expedition launches.</div>
      <div class="kit-embed">
        <script async data-uid="e715b015c9" src="https://living-big.kit.com/e715b015c9/index.js"></script>
      </div>
    </div>
  </div>

</div>

<script>
  // Hide Kit branding by text match (CSS selectors can miss it)
  function hideKitBranding() {
    document.querySelectorAll('.kit-embed').forEach(embed => {
      embed.querySelectorAll('*').forEach(el => {
        const text = (el.textContent || '').trim().toLowerCase();
        const isBranding = (
          text === 'built with kit' ||
          text === 'powered by kit' ||
          text === 'powered by convertkit' ||
          (el.tagName === 'A' && el.href && (el.href.includes('kit.com') || el.href.includes('convertkit')))
        );
        if (isBranding && text.length < 40) {
          let target = el;
          while (target.parentElement && target.parentElement !== embed && target.parentElement.children.length === 1) {
            target = target.parentElement;
          }
          target.style.display = 'none';
        }
      });
    });
  }
  setTimeout(hideKitBranding, 500);
  setTimeout(hideKitBranding, 1500);
  setTimeout(hideKitBranding, 3000);
</script>

</body>
